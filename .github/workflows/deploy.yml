name: Deploy Databricks App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Configure Databricks
        run: |
          mkdir -p ~/.databricks
          cat > ~/.databrickscfg <<EOF
          [DEFAULT]
          host = ${{ secrets.DATABRICKS_HOST }}
          token = ${{ secrets.DATABRICKS_TOKEN }}
          EOF

      - name: Prepare workspace folder
        run: |
          mkdir workspace
          cp -r src workspace/
          cp package.json workspace/
          cp pnpm-lock.yaml workspace/
          cp tsconfig*.json workspace/
          cp nest-cli.json workspace/
          cp app.yaml workspace/

      - name: Deploy app
        run: |
          databricks apps deploy api-backoffice \
            --source-code-path ./workspace